server {
    listen 80;
    server_name _;

    # ── DNS interno de Docker ──────────────────────────────
    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json
               application/geo+json image/svg+xml;
    gzip_min_length 1024;

    # ── Healthcheck nginx ──────────────────────────────────
    location = /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # ── Proxy /api/* → backend FastAPI ────────────────────
    # CORRECCIÓN: el servicio en docker-compose se llama "backend",
    # NO "georiesgo_api" (ese es el container_name, no el hostname DNS).
    # proxy_pass sin trailing slash reescribe la URL completa incluyendo /api/
    location /api/ {
        set $upstream http://backend:8000;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout  10s;
        proxy_read_timeout    120s;
        proxy_send_timeout     30s;
        proxy_buffering off;
    }

    # ── SPA fallback ──────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|woff2?|png|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}