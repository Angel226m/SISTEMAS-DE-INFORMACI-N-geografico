server {
    listen 80;
    server_name _;

    # ── DNS interno Docker ─────────────────────────────────
    resolver 127.0.0.11 valid=10s ipv6=off;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Compresión gzip ────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_min_length   1024;
    gzip_types
        text/plain text/css text/javascript text/xml text/x-component
        application/javascript application/json application/geo+json
        application/xml application/xhtml+xml application/rss+xml
        application/atom+xml application/vnd.ms-fontobject
        font/truetype font/opentype image/svg+xml;

    # ── Healthcheck ────────────────────────────────────────
    location = /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # ── Proxy /api/v1/* → backend FastAPI ─────────────────
    # El servicio en docker-compose se llama "backend" (hostname DNS interno)
    location /api/ {
        set $upstream http://backend:8000;
        proxy_pass             $upstream;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_connect_timeout  10s;
        proxy_read_timeout     120s;
        proxy_send_timeout     30s;
        # Sin buffering → la respuesta llega al cliente antes
        proxy_buffering        off;
        # Pasar ETags del backend para cache HTTP del navegador
        proxy_pass_header      ETag;
        proxy_pass_header      Cache-Control;
    }

    # ── Assets estáticos — caché inmutable 1 año ──────────
    location ~* \.(js|css|woff2?|ttf|otf|eot|svg|ico|png|webp|jpg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary         "Accept-Encoding";
        access_log off;
    }

    # ── SPA fallback ───────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # index.html no debe cachearse — la app se actualiza
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # ── Seguridad básica ───────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"        always;
    add_header X-Frame-Options         "SAMEORIGIN"     always;
    add_header X-XSS-Protection        "1; mode=block"  always;
    add_header Referrer-Policy         "same-origin"    always;
}