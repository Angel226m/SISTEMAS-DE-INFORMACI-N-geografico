<!DOCTYPE html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GeoRiesgo Ica — Riesgo Sísmico</title>

    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

    <meta name="description" content="Plataforma interactiva de visualización de riesgo sísmico para la región Ica, Perú. Datos USGS, IGP, INGEMMET." />
    <meta property="og:title"       content="GeoRiesgo Ica — Riesgo Sísmico" />
    <meta property="og:description" content="Mapa sísmico interactivo con datos históricos 1960–2023 de la región Ica." />
    <meta property="og:type"        content="website" />

    <!-- MapLibre GL CSS — cargado desde npm en main.tsx (no desde CDN) -->

    <style>
      /* CSS crítico inline para garantizar que el layout funcione */
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root {
        height: 100%; width: 100%;
        margin: 0; padding: 0;
        overflow: hidden;
        background: #07070e;
        color: white;
      }

      /* Fuentes */
      .font-display { font-family: 'Syne', sans-serif; }
      .font-body    { font-family: 'DM Sans', sans-serif; }
      .font-mono    { font-family: 'JetBrains Mono', monospace !important; }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 3px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

      /* Range inputs */
      input[type=range] {
        -webkit-appearance: none;
        width: 100%; height: 4px;
        border-radius: 2px;
        outline: none;
        background: rgba(255,255,255,0.1);
      }
      input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px; height: 14px;
        border-radius: 50%;
        background: white;
        cursor: pointer;
        box-shadow: 0 0 6px rgba(0,0,0,0.5);
        transition: transform 0.15s;
      }
      input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }

      /* MapLibre overrides */
      .maplibregl-ctrl-attrib,
      .maplibregl-ctrl-logo { display: none !important; }
      .maplibregl-ctrl-group {
        background: rgba(10,10,20,0.92) !important;
        backdrop-filter: blur(16px) !important;
        border: 1px solid rgba(255,255,255,0.1) !important;
        border-radius: 12px !important;
        box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
        overflow: hidden;
      }
      .maplibregl-ctrl-group button {
        background: transparent !important;
        color: rgba(255,255,255,0.6) !important;
        border: none !important;
      }
      .maplibregl-ctrl-group button:hover {
        background: rgba(255,255,255,0.08) !important;
        color: white !important;
      }
      .maplibregl-ctrl-scale {
        background: rgba(10,10,20,0.85) !important;
        border: 1px solid rgba(255,255,255,0.15) !important;
        color: rgba(255,255,255,0.7) !important;
        font-family: 'JetBrains Mono', monospace !important;
        font-size: 9px !important;
        border-radius: 6px !important;
        padding: 2px 6px !important;
      }

      /* Animaciones */
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes pulseRing {
        0%   { transform: scale(0.8); opacity: 1; }
        100% { transform: scale(2); opacity: 0; }
      }
      @keyframes shimmer {
        0%   { background-position: -200% center; }
        100% { background-position: 200% center; }
      }
      .animate-slide-up { animation: slideUp 0.25s ease-out forwards; }
      .animate-fade-in  { animation: fadeIn 0.3s ease forwards; }
      .pulse-ring       { animation: pulseRing 1.5s ease-out infinite; }
      .shimmer {
        background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.12) 50%, rgba(255,255,255,0.05) 75%);
        background-size: 200% auto;
        animation: shimmer 1.5s linear infinite;
      }

      /* Gradiente sutil en header */
      .header-gradient {
        background: linear-gradient(180deg, rgba(15,5,25,0.98) 0%, rgba(10,10,18,0.95) 100%);
      }

      /* Glassmorphism sidebar */
      .glass {
        background: rgba(8,8,18,0.88);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
