 
# ══════════════════════════════════════════════════════════
#  GeoRiesgo Perú — Stack v4.0
#  PostGIS + FastAPI + Nginx
# ══════════════════════════════════════════════════════════

services:

  # ── Base de datos: PostgreSQL 16 + PostGIS 3.4 (Alpine) ─
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: georiesgo_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       georiesgo
      POSTGRES_USER:     georiesgo
      POSTGRES_PASSWORD: ${DB_PASSWORD:-georiesgo_secret}
      PGDATA:            /var/lib/postgresql/data/pgdata
      # Tuning básico para PostGIS
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=es_PE.UTF-8"
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c work_mem=16MB
        -c max_connections=50
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c random_page_cost=1.1
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "${DB_PORT_EXPOSE:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U georiesgo -d georiesgo -q"]
      interval: 10s
      timeout:  5s
      retries:  10
      start_period: 30s
    networks:
      - georiesgo_net
    deploy:
      resources:
        limits:
          memory: 1g

  # ── Backend: FastAPI ligero (sin GDAL) ──────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
      cache_from:
        - python:3.12-slim
    image: georiesgo_api:4.0
    container_name: georiesgo_api
    restart: unless-stopped
    environment:
      DATABASE_URL:      postgresql://georiesgo:${DB_PASSWORD:-georiesgo_secret}@db:5432/georiesgo
      DATABASE_URL_SYNC: postgresql://georiesgo:${DB_PASSWORD:-georiesgo_secret}@db:5432/georiesgo
      DB_HOST:           db
      DB_PORT:           5432
      POSTGRES_DB:       georiesgo
      POSTGRES_USER:     georiesgo
      APP_ENV:           ${APP_ENV:-production}
      LOG_LEVEL:         ${LOG_LEVEL:-INFO}
      FORCE_SYNC:        ${FORCE_SYNC:-0}
      WORKERS:           ${WORKERS:-2}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout:  10s
      start_period: 180s
      retries:  5
    networks:
      - georiesgo_net
    deploy:
      resources:
        limits:
          memory: 512m

  # ── Frontend: nginx proxy ────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""   # vacío = rutas relativas /api/*
    container_name: georiesgo_frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - georiesgo_net
    deploy:
      resources:
        limits:
          memory: 64m

volumes:
  pgdata:
    driver: local

networks:
  georiesgo_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16